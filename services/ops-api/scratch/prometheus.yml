global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
      
  - job_name: 'ops-api'
    metrics_path: '/metrics'
    static_configs:
      # Scrape the Go backend running locally on the MacBook Pro
      - targets: ['Shubhams-MacBook-Pro.local:8080']
