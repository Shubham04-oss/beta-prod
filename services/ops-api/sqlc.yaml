version: "2"
sql:
  - engine: "postgresql"
    queries: "db/query/"
    schema: "../../infrastructure/postgres/"
    gen:
      go:
        package: "db"
        out: "../../pkg/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: vector
            go_type:
              import: "github.com/pgvector/pgvector-go"
              type: "Vector"
              pointer: true
